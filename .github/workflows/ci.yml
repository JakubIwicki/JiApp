name: CI

on:
  push:
    branches: [main, micros]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build backend/JiApp.sln
      - name: Test
        run: dotnet test backend/JiApp.sln --no-build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        run: npm ci
        working-directory: mobile
      - name: Type check
        run: npx tsc --noEmit
        working-directory: mobile
      - name: Test
        run: npx jest --passWithNoTests
        working-directory: mobile

  docker:
    runs-on: ubuntu-latest
    needs: [backend, mobile]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose -f backend/docker-compose.yml build
