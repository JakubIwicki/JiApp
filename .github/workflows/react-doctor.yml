name: React Doctor

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: millionco/react-doctor@main
        with:
          directory: mobile
          fail-on: warning
          comment: true
          annotations: true
