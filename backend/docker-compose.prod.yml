# Production override — SQLite, HTTPS Gateway, no PostgreSQL.
# Use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  identity:
    ports: []
    build:
      context: .
      dockerfile: ./src/JiApp.Identity/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://*:6701"
      ConnectionString: Data Source=/app/data/jiapp_identity.db
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp}
      Jwt__Audience: ${JWT_AUDIENCE:-JiAppMobile}
      Jwt__AccessTokenExpireMinutes: ${JWT_ACCESS_EXPIRE:-15}
      Jwt__RefreshTokenExpireDays: ${JWT_REFRESH_EXPIRE:-7}
    volumes:
      - jiapp_data:/app/data
      - jiapp_logs:/app/logs
    restart: unless-stopped

  ytdownloader:
    ports: []
    build:
      context: .
      dockerfile: ./src/JiApp.YtDownloader/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://*:6702"
      ConnectionString: Data Source=/app/data/jiapp_ytdownloader.db
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp}
      Jwt__Audience: ${JWT_AUDIENCE:-JiAppMobile}
      Youtube__ApiKey: ${YOUTUBE_API_KEY:?required}
      Youtube__CookiesFile: ${YOUTUBE_COOKIES_FILE:-}
      Youtube__Proxy: ${YOUTUBE_PROXY:-}
      DeepSeek__ApiKey: ${DEEPSEEK_API_KEY:-}
      DeepSeek__Model: ${DEEPSEEK_MODEL:-}
      # GC heap limit tuned during Phase F load-test (empty = no cap)
      DOTNET_GCHeapHardLimit: ${YT_GC_HEAP_LIMIT:-}
    volumes:
      - jiapp_data:/app/data
      - jiapp_logs:/app/logs
      - ./certs/prod/youtube:/app/cookies
    depends_on:
      - bgutil-provider
      - warp
    restart: unless-stopped

  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped

  warp:
    image: caomingjun/warp:latest
    restart: unless-stopped
    device_cgroup_rules:
      - 'c 10:200 rwm'
    environment:
      - WARP_SLEEP=2
    cap_add:
      - MKNOD
      - AUDIT_WRITE
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data:/var/lib/cloudflare-warp

  imagetools:
    ports: []
    build:
      context: .
      dockerfile: ./src/JiApp.ImageTools/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://*:6703"
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp}
      Jwt__Audience: ${JWT_AUDIENCE:-JiAppMobile}
    volumes:
      - jiapp_logs:/app/logs
    restart: unless-stopped

  scheduler:
    ports: []
    build:
      context: .
      dockerfile: ./src/JiApp.Scheduler/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://*:6704"
      ConnectionString: Data Source=/app/data/jiapp_scheduler.db
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp}
      Jwt__Audience: ${JWT_AUDIENCE:-JiAppMobile}
    volumes:
      - jiapp_data:/app/data
      - jiapp_logs:/app/logs
    restart: unless-stopped

  lovingboards:
    ports: []
    build:
      context: .
      dockerfile: ./src/api.JiApp.LovingBoards/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://*:6705"
      ConnectionString: Data Source=/app/data/jiapp_lovingboards.db
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp}
      Jwt__Audience: ${JWT_AUDIENCE:-JiAppMobile}
    volumes:
      - jiapp_data:/app/data
      - jiapp_logs:/app/logs
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: ./src/JiApp.Gateway/Dockerfile
    ports:
      - "6700:6700"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp}
      Jwt__Audience: ${JWT_AUDIENCE:-JiAppMobile}
      Kestrel__Endpoints__Https__Certificate__Path: /app/certs/server.pfx
      Kestrel__Endpoints__Https__Certificate__Password: ${CERT_PASSWORD:?required}
      ReverseProxy__Clusters__identity-cluster__Destinations__identity__Address: "http://identity:6701"
      ReverseProxy__Clusters__yt-cluster__Destinations__yt__Address: "http://ytdownloader:6702"
      ReverseProxy__Clusters__imagetools-cluster__Destinations__imagetools__Address: "http://imagetools:6703"
      ReverseProxy__Clusters__scheduler-cluster__Destinations__scheduler__Address: "http://scheduler:6704"
      ReverseProxy__Clusters__lovingboards-cluster__Destinations__lovingboards__Address: "http://lovingboards:6705"
    volumes:
      - ./certs/prod/server.pfx:/app/certs/server.pfx:ro
      - ./logs:/app/logs
    depends_on:
      - identity
      - ytdownloader
      - imagetools
      - scheduler
      - lovingboards
    restart: unless-stopped

volumes:
  jiapp_data:
  jiapp_logs:
  warp_data:
