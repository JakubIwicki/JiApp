services:
  postgres:
    ports: []
    environment:
      POSTGRES_USER: jiapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_MULTIPLE_DATABASES: jiapp_identity,jiapp_ytdownloader,jiapp_scheduler
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jiapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  identity:
    ports: []
    build:
      context: .
      dockerfile: ./src/JiApp.Identity/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://*:6701"
      ConnectionString: Host=postgres;Port=5432;Database=jiapp_identity;Username=jiapp;Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp-Identity}
      Jwt__Audience: ${JWT_AUDIENCE:-jiapp-gateway}
      Jwt__AccessTokenExpireMinutes: ${JWT_ACCESS_EXPIRE:-15}
      Jwt__RefreshTokenExpireDays: ${JWT_REFRESH_EXPIRE:-7}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ytdownloader:
    ports: []
    build:
      context: .
      dockerfile: ./src/JiApp.YtDownloader/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://*:6702"
      ConnectionString: Host=postgres;Port=5432;Database=jiapp_ytdownloader;Username=jiapp;Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp-Identity}
      Jwt__Audience: ${JWT_AUDIENCE:-jiapp-gateway}
      Youtube__ApiKey: ${YOUTUBE_API_KEY:?required}
      Youtube__CookiesFile: ${YOUTUBE_COOKIES_FILE:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  imagetools:
    ports: []
    build:
      context: .
      dockerfile: ./src/JiApp.ImageTools/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://*:6703"
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp-Identity}
      Jwt__Audience: ${JWT_AUDIENCE:-jiapp-gateway}
    depends_on:
      - identity
    restart: unless-stopped

  scheduler:
    ports: []
    build:
      context: .
      dockerfile: ./src/JiApp.Scheduler/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://*:6704"
      ConnectionString: Host=postgres;Port=5432;Database=jiapp_scheduler;Username=jiapp;Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp-Identity}
      Jwt__Audience: ${JWT_AUDIENCE:-jiapp-gateway}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: ./src/JiApp.Gateway/Dockerfile
    ports:
      - "6700:6700"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 6700
      ASPNETCORE_HTTPS_PORTS:
      Jwt__Key: ${JWT_KEY:?required}
      Jwt__Issuer: ${JWT_ISSUER:-JiApp-Identity}
      Jwt__Audience: ${JWT_AUDIENCE:-jiapp-gateway}
      ReverseProxy__Clusters__identity-cluster__Destinations__identity__Address: "http://identity:6701"
      ReverseProxy__Clusters__yt-cluster__Destinations__yt__Address: "http://ytdownloader:6702"
      ReverseProxy__Clusters__imagetools-cluster__Destinations__imagetools__Address: "http://imagetools:6703"
      ReverseProxy__Clusters__scheduler-cluster__Destinations__scheduler__Address: "http://scheduler:6704"
    depends_on:
      - identity
      - ytdownloader
      - imagetools
      - scheduler
    restart: unless-stopped

volumes:
  pgdata:
